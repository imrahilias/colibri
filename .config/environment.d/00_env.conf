#!/bin/false
#
#   _ \ __ \\ \   /
#   __/ |   |\ \ /
# \___|_|  _| \_/
#

EDITOR="/usr/bin/emacs"
GOPATH="$HOME/.go"
ZDOTDIR="$HOME/.config/zsh"

# signal now fails.
#SIGNAL_PASSWORD_STORE='gnome-libsecret'

# 1password unlock.
#OP_BIOMETRIC_UNLOCK_ENABLED=true

# The `gutter` should by default be `bg+` which it might take the default
# foreground, which is black, and not what i want, so it gets white. Other nice
# options: "--preview-border=none --layout=reverse"
FZF_DEFAULT_OPTS="--style=minimal --no-height --no-info --no-separator --border=none --prompt '▶ ' --marker='█' --pointer='◆' --color=fg:-1,fg+:-1,bg:-1,bg+:-1,preview-fg:-1,preview-bg:-1,hl:cyan,hl+:magenta,info:-1,marker:magenta,prompt:magenta,spinner:#330099,pointer:magenta,header:-1,border:-1,label:-1,query:-1,gutter:white"
FZF_ALT_C_OPTS="--preview 'tree -C {} | head -100'"

# Ripgrep will not look in any predetermined directory for a config file
# automatically.
RIPGREP_CONFIG_PATH="$HOME/.config/ripgreprc"

# ssh managment is moving to grc.
SSH_AUTH_SOCK="$XDG_RUNTIME_DIR/gcr/ssh"

# Default directories.
XDG_CONFIG_DIRS="/etc/xdg/"
XDG_CONFIG_HOME="$HOME/.config"
XDG_DESKTOP_DIR="$HOME"
XDG_DOCUMENTS_DIR="$HOME/projects"
XDG_DOWNLOAD_DIR="$HOME/downloads"
XDG_MUSIC_DIR="$HOME"
XDG_PICTURES_DIR="$HOME/photos"
XDG_PUBLICSHARE_DIR="$HOME"
XDG_TEMPLATES_DIR="$HOME"
XDG_VIDEOS_DIR="$HOME/movies"

CALIBRE_USE_DARK_PALETTE=0

# On arch linux, you should use ~/.xsession instead of ~/.bashrc for the CSDs to
# be disabled properly. Neither GTK_CSD=0 nor LD_PRELOAD does not seem to work
# in environment.d.
# LD_PRELOAD="/usr/lib/libgtk3-nocsd.so.0${LD_PRELOAD:+:$LD_PRELOAD}"
GTK_CSD=0

XSECURELOCK_AUTH="auth_x11"
XSECURELOCK_AUTHPROTO="authproto_pam"
XSECURELOCK_PAM_SERVICE="xsecurelock"
XSECURELOCK_BLANK_DPMS_STATE="suspend"
XSECURELOCK_PASSWORD_PROMPT="time_hex"
XSECURELOCK_NO_PAM_RHOST=1
XSECURELOCK_SHOW_HOSTNAME=0
XSECURELOCK_SHOW_USERNAME=0
XSECURELOCK_SHOW_KEYBOARD_LAYOUT=0

# If not using the according XDG Desktop Portal, you might have to set the
# environment variable ADW_DISABLE_PORTAL=1 for theme set via GSettings to be
# picked up.
XDG_CURRENT_DESKTOP="GNOME"
ADW_DISABLE_PORTAL=1
ADW_DEBUG_COLOR_SCHEME="prefer-light"
GTK_USE_PORTAL=1
GDK_DEBUG="portals"

# qt looks like current gtk theme.
# qt themes use the gtk2/3 theme arc-BLACKEST converted via qt6gtk2,
# has to be run from yay whenever either qt6 or gtk2/3 change,
# no way to do that for two themes in the background though.
#QT_QPA_PLATFORMTHEME="gtk2"
#QT_STYLE_OVERRIDE="gtk2"

# Unless some random channel should become main whenever something changes:
ALSA_CARD="PCH"
ALSA_CTL="PCH"
