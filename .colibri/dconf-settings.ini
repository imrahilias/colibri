reminders-past=['c78b15420ae33393acfb2dc4b8062aa934fbeec3\n9a4e8de553b64f23a5b99cd7bd3b6065a07e3245\t20260616T090000\n1781592300\n1781593200\n1781622000\nBEGIN:VEVENT\r\nORGANIZER;CN="Süßmann, Ingrid":MAILTO:ingrid.suessmann@tuwien.ac.at\r\nDESCRIPTION;LANGUAGE=en-US:Liebe Kolleg_innen\\,\\n\\nich lade euch herzlich \r\n zum nächsten gemeinsamen CIT-Workshop am 16. Juni von 9:00 bis 17:00 Uhr \r\n im Festsaal ein. Die Kalendereinladung folgt separat\\; bitte gebt wie \r\n gewohnt über „Jetzt antworten“ eine verbindliche \r\n Rückmeldung.\\n\\nDer ursprünglich geplante Termin musste aufgrund des \r\n Security Incidents leider entfallen. Umso mehr freue ich mich\\, dass wir \r\n den Workshop nun nachholen können. Am Vormittag werden wir konkrete \r\n nächste Schritte ableiten und auf Basis der Incident-Retros gemeinsam \r\n erarbeiten\\, wie wir künftig noch besser vorbereitet und resilient auf \r\n vergleichbare Situationen reagieren können.\\n\\nAm Nachmittag richten wir \r\n den Blick nach vorne: Im Fokus stehen die zentralen technischen Ziele der \r\n Campus IT\\, insbesondere digitale Souveränität und ein \r\n leistungsfähiges\\, produktives IT-Umfeld. Als Auftakt einer neuen \r\n Vortragsreihe begrüßen wir dazu Kolleg_innen der WienIT. Auch in \r\n zukünftigen Terminen möchten wir diesen Austausch mit dem öffentlichen \r\n Bereich weiter vertiefen\\, um voneinander zu lernen.\\n\\nZum Abschluss \r\n nehmen wir unsere Arbeits-Prozesse gemeinsam unter die Lupe und \r\n identifizieren gezielt Ansatzpunkte\\, um Abläufe effizienter und \r\n reibungsloser zu gestalten.\\n\\nDer Workshop ist ein wichtiger Bestandteil \r\n unseres OE-Prozesses. Ich bitte euch daher\\, euch diesen Termin nach \r\n Möglichkeit freizuhalten.\\n\\nIch freue mich auf einen produktiven Tag \r\n mit euch!\\n\\nLG\\,\\nWolfgang\\n\r\nUID:\r\n 040000008200E00074C5B7101A82E0080000000020E739E3C78ADC01000000000000000010\r\n 0000009D098D2DAD9D7B40A7ADD1DEF7750BDF\r\nSUMMARY;LANGUAGE=en-US:CIT-Works