ody dir="ltr">\\n<div \r\n id="divtagdefaultwrapper" style="font-size:12pt;color:#000000;font-family:\r\n Calibri,Helvetica,sans-serif;" dir="ltr">\\n<div style="">\\n<p \r\n style="margin: 0cm;"><font color="#212121" face="wf_segoe-ui_normal, \r\n Segoe UI, Segoe WP, Tahoma, Arial, sans-serif, serif, EmojiFont"><span \r\n style="font-size: 13.3333px;">Liebe Kolleg_innen,</span></font><br \r\n style="color: rgb(33, 33, 33); font-family: wf_segoe-ui_normal, &quot;\r\n Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, Arial, sans-serif, serif, \r\n EmojiFont; font-size: 13.3333px;">\\n<span style="font-family: \r\n wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, \r\n Arial, sans-serif, serif, EmojiFont; font-size: 13.3333px; color: rgb(33, \r\n 33, 33);">&nbsp;</span><br style="color: rgb(33, 33, 33); font-family: \r\n wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, \r\n Arial, sans-serif, serif, EmojiFont; font-size: 13.3333px;">\\n<span \r\n style="font-family: wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe \r\n WP&quot;, Tahoma, Arial, sans-serif, serif, EmojiFont; font-size: \r\n 13.3333px; color: rgb(33, 33, 33);">ich lade euch herzlich zum nächsten \r\n gemeinsamen CIT-Workshop am 16. Juni von 9:00 bis 17:00 Uhr\\n im Festsaal \r\n ein. Die Kalendereinladung folgt separat; bitte gebt wie gewohnt über \r\n „Jetzt antworten“ eine verbindliche Rückmeldung.</span><br \r\n style="color: rgb(33, 33, 33); font-family: wf_segoe-ui_normal, &quot;\r\n Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, Arial, sans-serif, serif, \r\n EmojiFont; font-size: 13.3333px;">\\n<br style="color: rgb(33, 33, 33); \r\n font-family: wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe \r\n WP&quot;, Tahoma, Arial, sans-serif, serif, EmojiFont; font-size: \r\n 13.3333px;">\\n<span style="font-family: wf_segoe-ui_normal, &quot;Segoe \r\n UI&quot;, &quot;Segoe WP&quot;, Tahoma, Arial, sans-serif, serif, \r\n EmojiFont; font-size: 13.3333px; color: rgb(33, 33, 33);">Der \r\n ursprünglich geplante Termin musste aufgrund des Security Incidents \r\n leider entfallen. Umso\\n mehr freue ich mich, dass wir den Workshop nun \r\n nachholen können. Am Vormittag werden wir konkrete nächste Schritte \r\n ableiten und auf Basis der Incident-Retros gemeinsam erarbeiten, wie wir \r\n künftig noch besser vorbereitet und resilient auf vergleichbare \r\n Situationen\\n reagieren können.</span><br style="color: rgb(33, 33, 33); \r\n font-family: wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe \r\n WP&quot;, Tahoma, Arial, sans-serif, serif, EmojiFont; font-size: \r\n 13.3333px;">\\n<br style="color: rgb(33, 33, 33); font-family: \r\n wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, \r\n Arial, sans-serif, serif, EmojiFont; font-size: 13.3333px;">\\n<span \r\n style="font-family: wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe \r\n WP&quot;, Tahoma, Arial, sans-serif, serif, EmojiFont; font-size: \r\n 13.3333px; color: rgb(33, 33, 33);">Am Nachmittag richten wir den Blick \r\n nach vorne: Im Fokus stehen die zentralen technischen Ziele\\n der Campus \r\n IT, insbesondere digitale Souveränität und ein leistungsfähiges, \r\n produktives IT-Umfeld. Als Auftakt einer neuen Vortragsreihe begrüßen \r\n wir dazu Kolleg_innen der WienIT. Auch in zukünftigen Terminen möchten \r\n wir diesen Austausch mit dem öffentlichen\\n Bereich weiter vertiefen, um \r\n voneinander zu lernen.</span><br style="color: rgb(33, 33, 33); \r\n font-family: wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe \r\n WP&quot;, Tahoma, Arial, sans-serif, serif, EmojiFont; font-size: \r\n 13.3333px;">\\n<br style="color: rgb(33, 33, 33); font-family: \r\n wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, \r\n Arial, sans-serif, serif, EmojiFont; font-size: 13.3333px;">\\n<span \r\n style="font-family: wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe \r\n WP&quot;, Tahoma, Arial, sans-serif, serif, EmojiFont; font-size: \r\n 13.3333px; color: rgb(33, 33, 33);">Zum Abschluss nehmen wir unsere \r\n Arbeits-Prozesse gemeinsam unter die Lupe und identifizieren gezielt\\n \r\n Ansatzpunkte, um Abläufe effizienter und reibungsloser zu \r\n gestalten.</span><br style="color: rgb(33, 33, 33); font-family: \r\n wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, \r\n Arial, sans-serif, serif, EmojiFont; font-size: 13.3333px;">\\n<br \r\n style="color: rgb(33, 33, 33); font-family: wf_segoe-ui_normal, &quot;\r\n Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, Arial, sans-serif, serif, \r\n EmojiFont; font-size: 13.3333px;">\\n<span style="font-family: \r\n wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, \r\n Arial, sans-serif, serif, EmojiFont; font-size: 13.3333px; color: rgb(33, \r\n 33, 33);">Der Workshop ist ein wichtiger Bestandteil unseres \r\n OE-Prozesses. Ich bitte euch daher, euch diesen\\n Termin nach \r\n Möglichkeit freizuhalten.</span><br style="color: rgb(33, 33, 33); \r\n font-family: wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe \r\n WP&quot;, Tahoma, Arial, sans-serif, serif, EmojiFont; font-size: \r\n 13.3333px;">\\n<br style="color: rgb(33, 33, 33); font-family: \r\n wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, \r\n Arial, sans-serif, serif, EmojiFont; font-size: 13.3333px;">\\n<span \r\n style="font-family: wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe \r\n WP&quot;, Tahoma, Arial, sans-serif, serif, EmojiFont; font-size: \r\n 13.3333px; color: rgb(33, 33, 33);">Ich freue mich auf einen produktiven \r\n Tag mit euch!</span><br style="color: rgb(33, 33, 33); font-family: \r\n wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, \r\n Arial, sans-serif, serif, EmojiFont; font-size: 13.3333px;">\\n<span \r\n style="font-family: wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe \r\n WP&quot;, Tahoma, Arial, sans-serif, serif, EmojiFont; font-size: \r\n 13.3333px; color: rgb(33, 33, 33);">&nbsp;</span><br style="color: \r\n rgb(33, 33, 33); font-family: wf_segoe-ui_normal, &quot;Segoe UI&quot;, \r\n &quot;Segoe WP&quot;, Tahoma, Arial, sans-serif, serif, EmojiFont; \r\n font-size: 13.3333px;">\\n<span style="font-family: wf_segoe-ui_normal, \r\n &quot;Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, Arial, sans-serif, \r\n serif, EmojiFont; font-size: 13.3333px; color: rgb(33, 33, 33);\r\n ">LG,</span><br style="color: rgb(33, 33, 33); font-family: \r\n wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe WP&quot;, Tahoma, \r\n Arial, sans-serif, serif, EmojiFont; font-size: 13.3333px;">\\n<span \r\n style="font-family: wf_segoe-ui_normal, &quot;Segoe UI&quot;, &quot;Segoe \r\n WP&quot;, Tahoma, Arial, sans-serif, serif, EmojiFont; font-size: \r\n 13.3333px; color: rgb(33, 33, 33);\r\n ">Wolfgang</span></p>\\n</div>\\n</div>\\n</body>\\n</html>\\n\r\nX-EWS-ORIGINAL-COMP:\r\n QkVHSU46VkVWRU5UDQpPUkdBTklaRVI7Q049IlPDvMOfbWFubiwgSW5ncmlkIjpNQUlMVE86aW\r\n 5ncmlkLnN1ZXNzbWFubkB0dXdpZW4uYWMuYXQNCkRFU0NSSVBUSU9OO0xBTkdVQUdFPWVuLVVT\r\n OkxpZWJlIEtvbGxlZ19pbm5lblwsXG5cbmljaCBsYWRlIGV1Y2ggaGVyemxpY2ggDQogenVtIG\r\n 7DpGNoc3RlbiBnZW1laW5zYW1lbiBDSVQtV29ya3Nob3AgYW0gMTYuIEp1bmkgdm9uIDk6MDAg\r\n YmlzIDE3OjAwIFVociANCiBpbSBGZXN0c2FhbCBlaW4uIERpZSBLYWxlbmRlcmVpbmxhZHVuZy\r\n Bmb2xndCBzZXBhcmF0XDsgYml0dGUgZ2VidCB3aWUgDQogZ2V3b2hudCDDvGJlciDigJ5KZXR6\r\n dCBhbnR3b3J0ZW7igJwgZWluZSB2ZXJiaW5kbGljaGUgDQogUsO8Y2ttZWxkdW5nLlxuXG5EZX\r\n IgdXJzcHLDvG5nbGljaCBnZXBsYW50ZSBUZXJtaW4gbXVzc3RlIGF1ZmdydW5kIGRlcyANCiBT\r\n ZWN1cml0eSBJbmNpZGVudHMgbGVpZGVyIGVudGZhbGxlbi4gVW1zbyBtZWhyIGZyZXVlIGljaC\r\n BtaWNoXCwgZGFzcyB3aXIgDQogZGVuIFdvcmtzaG9wIG51biBuYWNoaG9sZW4ga8O2bm5lbi4g\r\n QW0gVm9ybWl0dGFnIHdlcmRlbiB3aXIga29ua3JldGUgDQogbsOkY2hzdGUgU2Nocml0dGUgYW\r\n JsZWl0ZW4gdW5kIGF1ZiBCYXNpcyBkZXIgSW5jaWRlbnQtUmV0cm9zIGdlbWVpbnNhbSANCiBl\r\n cmFyYmVpdGVuXCwgd2llIHdpciBrw7xuZnRpZyBub2NoIGJlc3NlciB2b3JiZXJlaXRldCB1bm\r\n QgcmVzaWxpZW50IGF1ZiANCi